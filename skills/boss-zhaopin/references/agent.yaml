agent:
  name: "boss-zhaopin"
  mode: "on_demand_automatic"
  language: "zh-CN"
  timezone: "Asia/Shanghai"

boss_cli:
  command: "boss"
  default_job_keyword: "数据库研发"
  max_candidates_per_run: 1500
  max_auto_greetings_per_day: 150
  max_auto_replies_per_day: 500

automation:
  enable_auto_greet: true
  enable_auto_reply: true
  enable_auto_send: true
  unread_first: true
  recommendation_qualification_batch_size: 10
  refresh_recommendations_when_batch_has_no_match: true
  recommendation_refresh_interval_seconds:
    min: 1
    max: 2
  continue_recommendation_search_until_match: true
  continue_after_unconfirmed_greet: true
  require_knowledge_match: true
  allow_unknown_answer: false
  use_resume_preview: false
  verify_exact_chat_before_send: true
  stop_on_manual_outgoing_message: true

runtime:
  state_db: "~/.codex/state/boss-zhaopin/state.sqlite3"
  state_dir_env: "BOSS_ZHAOPIN_STATE_DIR"
  temporary_state_retention_days: 3
  dedupe_until: "2027-12-31"
  followup_interval_hours: 6
  max_no_reply_followups: 8
  max_application_status_questions: 2
  keep_wechat_ledger: true
  keep_daily_reports: true
  commit_runtime_data: false

reply:
  tone: "direct_natural_recruiter"
  max_length_chars: 300
  ask_one_question_when_needed: true
