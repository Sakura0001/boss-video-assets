policy:
  enabled: true
  source_file: "references/target_schools.md"
  match_field: "visible_education_schools"
  require_any_education_school_match: true
  graduation_year: 2027
  allowed_degrees:
    - "本科"
    - "研究生"
    - "硕士"
    - "博士"
  major_mode: "semantic_related_allowlist"
  allowed_majors:
    - "计算机科学与技术"
    - "大数据"
    - "电子信息"
    - "计算机技术"
    - "计算机科学"
    - "人工智能"
    - "软件工程"
    - "网络安全"
    - "新一代电子信息技术"
    - "信息工程"
    - "信息安全"
    - "信息与通信工程"
    - "自动化"
  automation_major_mode: "canonical_or_explicit_alias"
  major_aliases:
    "计算机类": "计算机科学与技术"
    "计算机应用技术": "计算机技术"
    "计算机软件与理论": "计算机科学"
    "电子与计算机工程": "计算机科学与技术"
    "数据科学": "大数据"
    "智能科学与技术": "人工智能"
    "模式识别与智能系统": "人工智能"
    "控制工程": "自动化"
    "控制科学与工程": "自动化"
    "网络空间安全": "网络安全"
    "网络工程": "计算机技术"
    "通信工程": "信息与通信工程"
    "通信与信息系统": "信息与通信工程"
    "信号与信息处理": "信息与通信工程"
    "软件技术": "软件工程"
    "物联网工程": "计算机技术"
  require_technical_experience: false
  unknown_profile_action: "no_reply"
  unmatched_profile_action: "no_reply"

privacy:
  expose_filter_reason_to_candidate: false
  save_profile_to_git: false

rules:
  - "读取页面右侧显示的全部教育经历学校；本科通常一所，硕士或博士可能显示多所，只要其中任意一所命中目标名单即可通过学校门槛。"
  - "目标学校全称或批准别名必须作为独立字段完整命中；更长院校名称仅包含目标学校文字时不得通过，例如吉林大学交通学院不得按吉林大学命中。"
  - "专业名称不要求逐字命中；人工判断时，学校自定义名称只要语义上能明确判断为计算机类，或与 allowed_majors 中某一方向相近，即可通过。"
  - "确定性自动化只允许直接命中 allowed_majors，或通过 major_aliases 映射到 allowed_majors；优先直接命中，多个近义词同时命中时取文本最长者。未列入映射、明显无关或无法判断时不回复，不得由脚本自由猜测。"
  - "不要求技术经历、编程经历或工作经历，可以从零培养。"
  - "学校、专业、学历、毕业年份任一无法识别时不回复。"
