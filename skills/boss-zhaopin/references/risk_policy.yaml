policy:
  default_action: "block"

  allow_auto_send_categories:
    - "approved_job_intro"
    - "approved_opportunity_wording"
    - "approved_application_status_question"
    - "approved_transfer_branch"
    - "approved_wechat_handoff"
    - "known_company_job_or_faq_answer"

  block_auto_send_when:
    - "知识库没有明确答案"
    - "无法精确打开候选人会话"
    - "学校、专业、学历或毕业年份不符合或无法识别"
    - "候选人要求未批准的 offer、录用、合同、背调或入职承诺"
    - "候选人追问未批准的精确薪资、奖金、社保或公积金"
    - "涉及年龄、性别、婚育、民族、宗教、地域或健康状况等敏感筛选"
    - "候选人投诉、要求停止联系、表达法律风险或举报意向"
    - "平台出现验证码、风控、异常弹窗或动作验证失败"
    - "检测到用户手动发送了更新的消息"

  state_change_require_verification:
    - "agree-resume"
    - "wechat"

  blocked_action:
    save_knowledge_gap: true
    send_automatically: false

notes:
  - "批准的机会话术可以自动发送，但不得扩写为一定录用或一定发 offer。"
  - "用户显式启动自动招人后，无需逐候选人请求发送确认。"
