# 自动发送风险策略

policy:
  default_action: "block" # allow | block
  allow_auto_send_when:
    - "候选人问题能在 knowledge/ 中找到明确答案"
    - "回复不包含录用保证、薪资保证、入职保证"
    - "回复不涉及年龄、性别、婚育、地域等敏感筛选"
    - "回复不要求候选人提供与招聘无关的隐私信息"
    - "回复长度不超过 config.agent.yaml 中的限制"

  block_auto_send_when:
    - "知识库没有明确答案"
    - "候选人要求确认 offer、录用、合同、背调、入职时间"
    - "候选人询问精确薪资、绩效、社保、公积金，但知识库没有明确口径"
    - "涉及年龄、性别、婚育、民族、宗教、地域、健康状况等敏感问题"
    - "需要消耗平台权益，例如在线简历预览或大批量打招呼"
    - "候选人表达投诉、不满、质疑、法律风险或平台举报意向"
    - "候选人未回复、未表现出意向，或未出现未投递、简历编号未给别人、转投/改投/路由、重新笔试、希望帮忙跟流程等微信承接条件时，准备执行 boss action wechat"

  blocked_reply_style:
    message: "这类问题需要人工确认后再回复。"
    save_draft: true
    send_automatically: false

categories:
  low_risk_auto_send:
    - "岗位是否还在招聘"
    - "工作地点"
    - "岗位职责"
    - "任职要求"
    - "面试流程"
    - "简历投递方式"
    - "基础福利"
  high_risk_manual_review:
    - "薪资谈判"
    - "offer 承诺"
    - "录用概率"
    - "合同和劳动关系"
    - "社保公积金精确政策"
    - "加班强度争议"
    - "候选人投诉"
